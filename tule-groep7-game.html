<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0533">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KlasQuest">
<title>KlasQuest – Groep 7</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22KlasQuest%22,%22short_name%22:%22KlasQuest%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231a0533%22,%22theme_color%22:%22%231a0533%22}">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0228;
    --bg2: #1a0533;
    --card: #1e0a3c;
    --card2: #2a1050;
    --border: #3d1a6e;
    --accent: #c084fc;
    --accent2: #e879f9;
    --gold: #fbbf24;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --orange: #fb923c;
    --text: #f0e6ff;
    --muted: #8b6bac;
    --xp-bar: #7c3aed;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND STARS */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 20% 80%, rgba(200,160,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 90%, rgba(200,160,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 15%, rgba(200,160,255,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { 
    display: none; 
    position: relative; 
    z-index: 1;
    min-height: 100vh;
  }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== HOME SCREEN ===== */
  #home {
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 20px;
    text-align: center;
  }

  .logo-area {
    animation: floatIn 0.8s ease both;
  }

  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 10vw, 4.5rem);
    background: linear-gradient(135deg, #c084fc, #e879f9, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(192,132,252,0.5));
  }

  .game-subtitle {
    font-size: 1rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .avatar-display {
    font-size: 5rem;
    animation: pulse 3s ease infinite;
    filter: drop-shadow(0 0 20px rgba(192,132,252,0.6));
  }

  .player-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px 28px;
    width: 100%;
    max-width: 380px;
    animation: floatIn 0.8s 0.2s ease both;
    box-shadow: var(--shadow);
  }

  .player-name {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
  }

  .player-level {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .xp-bar-wrap {
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    height: 14px;
    overflow: hidden;
    position: relative;
  }

  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #c084fc, #e879f9);
    border-radius: 10px;
    transition: width 0.8s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0 10px rgba(192,132,252,0.7);
  }

  .xp-label {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  .stats-row {
    display: flex;
    justify-content: space-around;
    margin-top: 16px;
    gap: 12px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--gold);
  }

  .stat-lbl {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* SUBJECT GRID */
  .subjects-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    animation: floatIn 0.8s 0.3s ease both;
  }

  .subjects-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 380px;
    animation: floatIn 0.8s 0.4s ease both;
  }

  .subject-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .subject-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: inherit;
  }

  .subject-btn:active { transform: scale(0.96); }
  .subject-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }

  .subject-btn.nl::before { background: linear-gradient(135deg, #3b1f6b, #1e0a3c); }
  .subject-btn.rw::before { background: linear-gradient(135deg, #1f3b6b, #0a1e3c); }
  .subject-btn.en::before { background: linear-gradient(135deg, #1f5b3b, #0a2e1c); }
  .subject-btn.ow::before { background: linear-gradient(135deg, #5b3b1f, #2e1c0a); }
  .subject-btn:hover::before { opacity: 1; }

  .subject-btn.nl { border-color: rgba(192,132,252,0.4); }
  .subject-btn.rw { border-color: rgba(96,165,250,0.4); }
  .subject-btn.en { border-color: rgba(74,222,128,0.4); }
  .subject-btn.ow { border-color: rgba(251,191,36,0.4); }

  .subj-icon { font-size: 2.2rem; display: block; margin-bottom: 6px; }
  .subj-name { font-weight: 800; font-size: 0.95rem; display: block; }
  .subj-prog { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  .subject-btn.nl .subj-name { color: var(--accent); }
  .subject-btn.rw .subj-name { color: var(--blue); }
  .subject-btn.en .subj-name { color: var(--green); }
  .subject-btn.ow .subj-name { color: var(--gold); }

  .name-input-area {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 380px;
    animation: floatIn 0.8s 0.1s ease both;
  }

  .name-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none;
    border-radius: 14px;
    padding: 12px 20px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(124,58,237,0.4);
    white-space: nowrap;
  }

  .btn-primary:active { transform: scale(0.96); }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(124,58,237,0.6); transform: translateY(-2px); }

  /* ===== QUIZ SCREEN ===== */
  #quiz {
    padding: 0;
    justify-content: flex-start;
  }

  .quiz-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
  }

  .back-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .back-btn:hover { background: var(--border); }

  .quiz-header-info { flex: 1; }

  .quiz-subject-name {
    font-weight: 800;
    font-size: 1rem;
  }

  .quiz-progress-wrap {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    height: 6px;
    margin-top: 5px;
  }

  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width 0.4s ease;
  }

  .quiz-question-count {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .streak-badge {
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    border-radius: 12px;
    padding: 6px 12px;
    font-weight: 800;
    font-size: 0.85rem;
    color: #1a0533;
    white-space: nowrap;
    transition: transform 0.2s;
  }

  .streak-badge.pop { animation: popBounce 0.4s ease; }

  .quiz-body {
    flex: 1;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    animation: slideUp 0.4s ease;
    box-shadow: var(--shadow);
  }

  .question-category {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .question-text {
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .answer-btn {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 16px 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    text-align: center;
    line-height: 1.3;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .answer-btn:hover:not(:disabled) { transform: scale(1.03); border-color: var(--accent); background: #2a1060; }
  .answer-btn:active:not(:disabled) { transform: scale(0.97); }

  .answer-btn.correct {
    border-color: var(--green);
    background: rgba(74,222,128,0.15);
    color: var(--green);
    animation: correctPulse 0.5s ease;
  }

  .answer-btn.wrong {
    border-color: var(--red);
    background: rgba(248,113,113,0.15);
    color: var(--red);
    animation: shake 0.4s ease;
  }

  .answer-btn:disabled { cursor: not-allowed; }

  /* FEEDBACK */
  .feedback-bar {
    border-radius: 16px;
    padding: 16px 20px;
    display: none;
    align-items: center;
    gap: 14px;
    animation: slideUp 0.3s ease;
  }

  .feedback-bar.show { display: flex; }
  .feedback-bar.correct { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); }
  .feedback-bar.wrong { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); }

  .feedback-icon { font-size: 1.8rem; flex-shrink: 0; }
  .feedback-text { flex: 1; }
  .feedback-title { font-weight: 800; font-size: 1rem; }
  .feedback-bar.correct .feedback-title { color: var(--green); }
  .feedback-bar.wrong .feedback-title { color: var(--red); }
  .feedback-explain { font-size: 0.82rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  .xp-gain {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--gold);
    flex-shrink: 0;
  }

  .next-btn {
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none;
    border-radius: 14px;
    padding: 16px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(124,58,237,0.4);
    display: none;
  }

  .next-btn.show { display: block; animation: slideUp 0.3s ease; }
  .next-btn:active { transform: scale(0.97); }
  .next-btn:hover { box-shadow: 0 6px 20px rgba(124,58,237,0.6); transform: translateY(-2px); }

  /* TIMER */
  .timer-ring {
    position: relative;
    width: 46px;
    height: 46px;
    flex-shrink: 0;
  }

  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring-bg { stroke: rgba(255,255,255,0.1); }
  .timer-ring-fill {
    stroke: var(--accent);
    stroke-dasharray: 126;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--text);
  }

  /* ===== RESULT SCREEN ===== */
  #result {
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    gap: 20px;
    text-align: center;
  }

  .result-emoji { font-size: 5rem; animation: bounceIn 0.8s ease; }

  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    animation: floatIn 0.6s 0.2s ease both;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
    animation: floatIn 0.6s 0.3s ease both;
    box-shadow: var(--shadow);
  }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .result-stat { text-align: center; }
  .result-stat-val { font-family: 'Fredoka One', cursive; font-size: 2rem; }
  .result-stat-lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .result-xp-earned {
    background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(251,191,36,0.05));
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .result-xp-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .result-xp-val { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--gold); }

  .level-up-badge {
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 16px;
    display: none;
    animation: bounceIn 0.5s ease;
  }

  .level-up-badge.show { display: block; }
  .level-up-badge-title { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; }
  .level-up-badge-sub { font-size: 0.82rem; color: rgba(255,255,255,0.7); }

  .result-btns { display: flex; flex-direction: column; gap: 10px; }

  .btn-secondary {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }

  .btn-secondary:hover { background: var(--border); transform: translateY(-2px); }
  .btn-secondary:active { transform: scale(0.97); }

  /* LEVEL UP POPUP */
  .levelup-popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .levelup-popup.show {
    opacity: 1;
    pointer-events: all;
  }

  .levelup-inner {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 28px;
    padding: 40px 32px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    animation: bounceIn 0.5s ease;
    box-shadow: 0 0 60px rgba(192,132,252,0.4);
  }

  .levelup-icon { font-size: 4rem; display: block; margin-bottom: 12px; }
  .levelup-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--accent); margin-bottom: 4px; }
  .levelup-level { font-family: 'Fredoka One', cursive; font-size: 3.5rem; color: var(--gold); line-height: 1; }
  .levelup-sub { color: var(--muted); font-size: 0.9rem; margin-top: 8px; margin-bottom: 20px; }

  /* XP FLOAT */
  .xp-float {
    position: fixed;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--gold);
    pointer-events: none;
    z-index: 200;
    text-shadow: 0 0 10px rgba(251,191,36,0.8);
    animation: xpFloat 1.2s ease forwards;
  }

  /* ACHIEVEMENTS */
  .achievement-toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 150;
    box-shadow: 0 0 20px rgba(251,191,36,0.3);
    animation: slideInRight 0.4s ease, slideOutRight 0.4s ease 3s forwards;
    max-width: 280px;
  }

  .ach-icon { font-size: 1.8rem; }
  .ach-title { font-size: 0.72rem; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .ach-name { font-weight: 800; font-size: 0.95rem; }

  /* ANIMATIONS */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounceIn {
    0% { opacity: 0; transform: scale(0.5); }
    70% { transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  @keyframes popBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes xpFloat {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-80px); opacity: 0; }
  }

  @keyframes slideInRight {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes slideOutRight {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(120%); opacity: 0; }
  }

  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 300;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- LEVEL UP POPUP -->
<div class="levelup-popup" id="levelupPopup">
  <div class="levelup-inner">
    <span class="levelup-icon">🌟</span>
    <div class="levelup-title">LEVEL UP!</div>

  try {
    const s = localStorage.getItem("klasquest_state");
    if (s) { state = { ...state, ...JSON.parse(s) }; }
  } catch(e) {}
}

// ===== INIT =====
loadState();
updateHomeUI();

function updateHomeUI() {
  if (state.name) {
    document.getElementById("nameArea").style.display = "none";
    document.getElementById("playerCard").style.display = "block";
    document.getElementById("playerNameDisplay").textContent = state.name;
    document.getElementById("playerLevelDisplay").textContent = `Level ${state.level} · ${levelTitles[Math.min(state.level, levelTitles.length-1)]}`;
    const pct = (state.xp / state.xpToNext) * 100;
    document.getElementById("homeXpFill").style.width = pct + "%";
    document.getElementById("homeXpLabel").textContent = `${state.xp} / ${state.xpToNext} XP`;
    document.getElementById("statTotal").textContent = state.totalAnswered;
    document.getElementById("statCorrect").textContent = state.totalCorrect;
    document.getElementById("statStreak").textContent = state.maxStreak;
  }
  Object.keys(state.subjectProgress).forEach(k => {
    document.getElementById("prog-" + k).textContent = state.subjectProgress[k] + " vragen gedaan";
  });
}

function saveName() {
  const n = document.getElementById("nameInput").value.trim();
  if (!n) return;
  state.name = n;
  saveState();
  document.getElementById("nameArea").style.display = "none";
  document.getElementById("playerCard").style.display = "block";
  updateHomeUI();
}

// ===== SUBJECT START =====
function startSubject(subj) {
  if (!state.name) {
    document.getElementById("nameInput").focus();
    return;
  }
  session = {
    subject: subj,
    questions: shuffle([...questions[subj]]).slice(0, QUESTIONS_PER_ROUND).map(shuffleAnswers),
    currentIdx: 0, correct: 0, wrong: 0,
    maxStreak: 0, xpEarned: 0, streak: state.streak,
    answered: false, timer: null, timerVal: 0
  };

  const meta = subjectMeta[subj];
  document.getElementById("quizSubjectName").textContent = meta.icon + " " + meta.name;
  document.getElementById("quizSubjectName").style.color = meta.color;

  showScreen("quiz");
  loadQuestion();
}

function loadQuestion() {
  const q = session.questions[session.currentIdx];
  const total = session.questions.length;
  const idx = session.currentIdx;

  document.getElementById("questionCategory").textContent = q.cat;
  document.getElementById("questionText").textContent = q.q;
  document.getElementById("quizProgressFill").style.width = (idx / total * 100) + "%";
  document.getElementById("quizQuestionCount").textContent = `Vraag ${idx + 1} van ${total}`;
  document.getElementById("streakBadge").textContent = "🔥 " + session.streak;

  // Answers
  const grid = document.getElementById("answersGrid");
  grid.innerHTML = "";
  q.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = ans;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  // Feedback + next
  const fb = document.getElementById("feedbackBar");
  fb.className = "feedback-bar";
  document.getElementById("nextBtn").className = "next-btn";

  session.answered = false;
  startTimer();
}

function startTimer() {
  clearInterval(session.timer);
  const MAX = 15;
  session.timerVal = MAX;
  updateTimerUI(MAX, MAX);

  session.timer = setInterval(() => {
    session.timerVal--;
    updateTimerUI(session.timerVal, MAX);
    if (session.timerVal <= 0) {
      clearInterval(session.timer);
      if (!session.answered) timeOut();
    }
  }, 1000);
}

function updateTimerUI(val, max) {
  const circ = 126;
  const offset = circ - (val / max) * circ;
  const ring = document.getElementById("timerRing");
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = val <= 5 ? "var(--red)" : val <= 8 ? "var(--orange)" : "var(--accent)";
  document.getElementById("timerText").textContent = val;
}

function timeOut() {
  if (session.answered) return;
  session.answered = true;
  const q = session.questions[session.currentIdx];
  const btns = document.querySelectorAll(".answer-btn");
  btns.forEach(b => b.disabled = true);
  btns[q.correct].classList.add("correct");
  showFeedback(false, q, 0, true);
  session.streak = 0;
  document.getElementById("streakBadge").textContent = "🔥 0";
  session.wrong++;
  state.totalAnswered++;
  saveState();
}

function selectAnswer(idx) {
  if (session.answered) return;
  clearInterval(session.timer);
  session.answered = true;

  const q = session.questions[session.currentIdx];
  const btns = document.querySelectorAll(".answer-btn");
  btns.forEach(b => b.disabled = true);

  const isCorrect = idx === q.correct;
  btns[idx].classList.add(isCorrect ? "correct" : "wrong");
  if (!isCorrect) btns[q.correct].classList.add("correct");

  let xpGain = 0;
  if (isCorrect) {
    xpGain = q.xp + (session.streak >= 3 ? 5 : 0) + (session.timerVal >= 10 ? 5 : 0);
    session.correct++;
    session.streak++;
    session.xpEarned += xpGain;
    if (session.streak > session.maxStreak) session.maxStreak = session.streak;
    state.totalCorrect++;
    addXp(xpGain);

    const badge = document.getElementById("streakBadge");
    badge.textContent = "🔥 " + session.streak;
    badge.classList.remove("pop");
    void badge.offsetWidth;
    badge.classList.add("pop");

    spawnXpFloat(xpGain);
  } else {
    session.wrong++;
    session.streak = 0;
    document.getElementById("streakBadge").textContent = "🔥 0";
  }

  state.streak = session.streak;
  if (state.maxStreak < session.maxStreak) state.maxStreak = session.maxStreak;
  state.totalAnswered++;
  state.subjectProgress[session.subject]++;
  saveState();
  checkAchievements();
  showFeedback(isCorrect, q, xpGain, false);
}

function showFeedback(correct, q, xpGain, timedOut) {
  const fb = document.getElementById("feedbackBar");
  fb.className = "feedback-bar show " + (correct ? "correct" : "wrong");
  document.getElementById("feedbackIcon").textContent = timedOut ? "⏰" : correct ? "✅" : "❌";
  document.getElementById("feedbackTitle").textContent = timedOut ? "Tijd is op!" : correct ? "Correct! 🎉" : "Helaas!";
  document.getElementById("feedbackExplain").textContent = q.explain;
  document.getElementById("feedbackXp").textContent = correct ? "+" + xpGain + " XP" : "";
  document.getElementById("nextBtn").className = "next-btn show";
}

function nextQuestion() {
  session.currentIdx++;
  if (session.currentIdx >= session.questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

// ===== XP + LEVEL =====
function addXp(amount) {
  const prevLevel = state.level;
  state.xp += amount;
  while (state.xp >= state.xpToNext) {
    state.xp -= state.xpToNext;
    state.level++;
    state.xpToNext = Math.floor(100 * Math.pow(1.4, state.level - 1));
  }
  if (state.level > prevLevel) {
    showLevelUp(state.level);
  }
}

function showLevelUp(lvl) {
  document.getElementById("levelupNumber").textContent = lvl;
  document.getElementById("levelupPopup").classList.add("show");
  spawnConfetti();
}

function closeLevelup() {
  document.getElementById("levelupPopup").classList.remove("show");
}

// ===== RESULT =====
function showResult() {
  const acc = session.correct / session.questions.length;
  let emoji = "🏆", title = "Uitstekend!";
  if (acc < 0.4) { emoji = "📚"; title = "Blijven oefenen!"; }
  else if (acc < 0.7) { emoji = "💪"; title = "Goed bezig!"; }
  else if (acc < 0.9) { emoji = "🌟"; title = "Super gedaan!"; }

  document.getElementById("resultEmoji").textContent = emoji;
  document.getElementById("resultTitle").textContent = title;
  document.getElementById("rCorrect").textContent = session.correct;
  document.getElementById("rWrong").textContent = session.wrong;
  document.getElementById("rStreak").textContent = session.maxStreak;
  document.getElementById("rXp").textContent = "+" + session.xpEarned + " XP";

  updateHomeUI();
  showScreen("result");
  if (acc >= 0.8) spawnConfetti();
}

function playAgain() {
  startSubject(session.subject);
}

// ===== ACHIEVEMENTS =====
function checkAchievements() {
  achievements.forEach(ach => {
    if (!state.unlockedAchievements.includes(ach.id) && ach.condition(state)) {
      state.unlockedAchievements.push(ach.id);
      saveState();
      showAchievementToast(ach);
    }
  });
}

function showAchievementToast(ach) {
  const el = document.createElement("div");
  el.className = "achievement-toast";
  el.innerHTML = `<div class="ach-icon">${ach.icon}</div><div><div class="ach-title">Prestatie behaald!</div><div class="ach-name">${ach.name}</div></div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ===== UTILS =====
function spawnXpFloat(amount) {
  const el = document.createElement("div");
  el.className = "xp-float";
  el.textContent = "+" + amount + " XP";
  el.style.left = (Math.random() * 60 + 20) + "%";
  el.style.top = "40%";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function spawnConfetti() {
  const colors = ["#c084fc","#fbbf24","#4ade80","#60a5fa","#f87171","#e879f9"];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.left = Math.random() * 100 + "vw";
    el.style.top = "-20px";
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
    el.style.animationDuration = (1.5 + Math.random() * 2) + "s";
    el.style.animationDelay = Math.random() * 0.8 + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function goHome() {
  clearInterval(session.timer);
  updateHomeUI();
  showScreen("home");
}
</script>
</body>
</html>
