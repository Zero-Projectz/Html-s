<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TafelKoning ⚔️</title>
<!-- Preconnect for speed, then load font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800;900&display=swap">
<style>
/* ── FONT FALLBACK: als Google Fonts niet laadt, gebruik system bold ── */
@font-face {
  font-family: 'Bangers';
  src: local('Bangers');
  font-display: swap;
}
/* Als Bangers niet beschikbaar is, valt het terug op Impact/system */

:root {
  --bg:#0a0a1a; --panel:#12122a; --panel2:#1a1a35;
  --accent:#f7c948; --accent2:#ff6b35; --accent3:#4ecdc4;
  --purple:#a855f7; --green:#22c55e; --red:#ef4444;
  --text:#f0f0ff; --muted:#8888aa;
  /* Mobile */
  --sp-xs:4px; --sp-sm:8px; --sp-md:13px; --sp-lg:17px; --sp-xl:22px;
  --fs-xs:12px; --fs-sm:13px; --fs-md:14px; --fs-lg:17px;
  --fs-xl:21px; --fs-2xl:30px; --fs-3xl:42px; --fs-4xl:52px;
  --r-sm:10px; --r-md:14px; --r-lg:18px;
}
@media(min-width:480px){
  :root{
    --sp-xs:5px; --sp-sm:10px; --sp-md:15px; --sp-lg:20px; --sp-xl:28px;
    --fs-xs:13px; --fs-sm:14px; --fs-md:16px; --fs-lg:19px;
    --fs-xl:26px; --fs-2xl:38px; --fs-3xl:54px; --fs-4xl:68px;
    --r-sm:11px; --r-md:16px; --r-lg:22px;
  }
}
@media(min-width:768px){
  :root{
    --sp-xs:6px; --sp-sm:12px; --sp-md:18px; --sp-lg:24px; --sp-xl:36px;
    --fs-xs:14px; --fs-sm:15px; --fs-md:17px; --fs-lg:22px;
    --fs-xl:30px; --fs-2xl:48px; --fs-3xl:64px; --fs-4xl:80px;
    --r-sm:12px; --r-md:18px; --r-lg:26px;
  }
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;
  font-weight:800;
  min-height:100vh;min-height:-webkit-fill-available;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  -webkit-overflow-scrolling:touch;
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(168,85,247,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(78,205,196,.06) 0%,transparent 50%);
}

/* Bangers font class — falls back to Impact */
.font-game{font-family:'Bangers',Impact,'Arial Narrow',Arial,sans-serif;font-weight:400;}

/* ── PARTICLES ── */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:pfloat linear infinite;opacity:.15;}
@keyframes pfloat{from{transform:translateY(110vh) rotate(0deg);opacity:.15;}to{transform:translateY(-10vh) rotate(720deg);opacity:0;}}

/* ── LAYOUT ── */
.container{
  position:relative;z-index:1;
  width:100%;max-width:700px;margin:0 auto;
  padding-top:var(--sp-md);
  padding-left:max(var(--sp-md),env(safe-area-inset-left,0px));
  padding-right:max(var(--sp-md),env(safe-area-inset-right,0px));
  padding-bottom:max(40px,env(safe-area-inset-bottom,0px));
}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:var(--sp-lg);}
.logo{
  font-family:'Bangers',Impact,'Arial Narrow',Arial,sans-serif;
  font-size:var(--fs-2xl);letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;animation:pulse-logo 3s ease-in-out infinite;
}
@keyframes pulse-logo{0%,100%{filter:drop-shadow(0 0 10px rgba(247,201,72,.4));}50%{filter:drop-shadow(0 0 24px rgba(247,201,72,.8));}}
.tagline{color:var(--muted);font-size:var(--fs-xs);margin-top:var(--sp-xs);letter-spacing:1px;font-weight:700;}

/* ── MODE TABS ── */
.mode-tabs{
  display:-webkit-flex;display:flex;
  gap:var(--sp-sm);margin-bottom:var(--sp-md);
  background:var(--panel);border-radius:var(--r-md);
  padding:4px;
}
.mode-tab{
  -webkit-appearance:none;appearance:none;
  flex:1;border:none;border-radius:calc(var(--r-md) - 2px);
  background:transparent;color:var(--muted);
  font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;
  font-size:var(--fs-xs);font-weight:900;
  padding:8px 4px;cursor:pointer;
  transition:all .2s;touch-action:manipulation;
  line-height:1.2;text-align:center;
}
.mode-tab.active{background:linear-gradient(135deg,var(--purple),var(--accent3));color:#fff;box-shadow:0 2px 10px rgba(168,85,247,.4);}

/* ── DIFFICULTY ── */
.difficulty-row{
  display:-webkit-flex;display:flex;
  gap:var(--sp-sm);margin-bottom:var(--sp-md);
  -webkit-align-items:center;align-items:center;
}
.diff-label{color:var(--muted);font-size:var(--fs-xs);font-weight:900;white-space:nowrap;letter-spacing:1px;}
.diff-btns{display:-webkit-flex;display:flex;gap:var(--sp-sm);flex:1;}
.diff-btn{
  -webkit-appearance:none;appearance:none;
  flex:1;border:2px solid rgba(255,255,255,.07);
  border-radius:var(--r-sm);background:var(--panel);color:var(--muted);
  font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;
  font-size:var(--fs-xs);font-weight:900;
  padding:7px 4px;cursor:pointer;transition:all .18s;
  touch-action:manipulation;text-align:center;
}
.diff-btn.active{border-color:var(--accent3);color:var(--accent3);background:rgba(78,205,196,.1);}

/* ── STATS ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-sm);margin-bottom:var(--sp-md);}
@media(max-width:360px){.stats-bar{grid-template-columns:repeat(2,1fr);}}
.stat-chip{
  background:var(--panel);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r-sm);padding:var(--sp-sm);
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:var(--sp-xs);min-width:0;overflow:hidden;
}
.stat-chip .icon{font-size:var(--fs-md);-webkit-flex-shrink:0;flex-shrink:0;}
.stat-chip .label{color:var(--muted);font-size:var(--fs-xs);display:block;line-height:1;white-space:nowrap;font-weight:900;}
.stat-chip .value{font-size:var(--fs-sm);line-height:1.2;white-space:nowrap;font-weight:900;}

/* ── XP BAR ── */
.xp-section{margin-bottom:var(--sp-md);}
.xp-header{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:baseline;align-items:baseline;margin-bottom:var(--sp-xs);}
.level-label{font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-lg);letter-spacing:1px;color:var(--accent);}
.xp-text{color:var(--muted);font-size:var(--fs-xs);font-weight:900;}
.xp-bar-bg{height:12px;background:var(--panel2);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.06);}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--accent));border-radius:999px;transition:width .6s cubic-bezier(.34,1.56,.64,1);position:relative;}
.xp-bar-fill::after{content:'';position:absolute;top:2px;left:10%;right:10%;height:35%;background:rgba(255,255,255,.3);border-radius:999px;}

/* ── SECTION TITLE ── */
.section-title{font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-sm);letter-spacing:2px;color:var(--muted);margin-bottom:var(--sp-sm);text-transform:uppercase;}

/* ── TABLE SELECTOR ── */
.table-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--sp-sm);margin-bottom:var(--sp-md);}
.table-btn{
  -webkit-appearance:none;appearance:none;
  background:var(--panel);border:2px solid rgba(255,255,255,.07);
  color:var(--text);
  font-family:'Bangers',Impact,Arial,sans-serif;
  font-size:var(--fs-lg);letter-spacing:1px;
  padding:9px 0;border-radius:var(--r-sm);
  cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;
  touch-action:manipulation;display:block;width:100%;text-align:center;
}
.table-btn:active{transform:scale(.94);}
.table-btn.selected{background:linear-gradient(135deg,rgba(247,201,72,.2),rgba(255,107,53,.2));border-color:var(--accent);color:var(--accent);box-shadow:0 0 18px rgba(247,201,72,.3);}
.table-btn.mastered::after{content:'✓';position:absolute;top:2px;right:4px;font-size:10px;color:var(--green);font-family:sans-serif;font-weight:900;}
.mix-btn{
  -webkit-appearance:none;appearance:none;
  grid-column:span 5;
  background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(78,205,196,.15));
  border:2px solid rgba(168,85,247,.3);
  color:var(--accent3);
  font-family:'Bangers',Impact,Arial,sans-serif;
  font-size:var(--fs-lg);letter-spacing:2px;
  padding:10px 0;border-radius:var(--r-sm);
  cursor:pointer;transition:all .18s;
  touch-action:manipulation;display:block;width:100%;text-align:center;
}
.mix-btn.selected{background:linear-gradient(135deg,rgba(168,85,247,.35),rgba(78,205,196,.35));border-color:var(--accent3);box-shadow:0 0 20px rgba(78,205,196,.3);}
.mix-btn:active{transform:scale(.97);}

/* ── GAME CARD ── */
.game-card{
  background:var(--panel);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r-md);padding:var(--sp-lg) var(--sp-md);
  text-align:center;margin-bottom:var(--sp-md);
  position:relative;overflow:hidden;min-height:180px;
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
}
.game-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(168,85,247,.08) 0%,transparent 60%);pointer-events:none;}

.question-display{
  font-family:'Bangers',Impact,'Arial Narrow',Arial,sans-serif;
  font-size:var(--fs-3xl);letter-spacing:4px;line-height:1;
  margin-bottom:var(--sp-sm);color:var(--text);
  text-shadow:0 0 40px rgba(255,255,255,.1);transition:all .3s;
}
.question-display.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px) rotate(-1deg);}40%{transform:translateX(8px) rotate(1deg);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.question-display.pop{animation:qpop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes qpop{0%{transform:scale(.6);opacity:.3;}100%{transform:scale(1);opacity:1;}}

/* ── TIMER RING ── */
.timer-ring-wrap{position:absolute;top:var(--sp-sm);right:var(--sp-sm);width:42px;height:42px;}
.timer-ring{transform:rotate(-90deg);width:100%;height:100%;display:block;}
.timer-ring circle{stroke-dasharray:100;stroke-dashoffset:0;stroke-linecap:round;transition:stroke-dashoffset .1s linear,stroke .3s;}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bangers',Impact,Arial,sans-serif;font-size:14px;letter-spacing:1px;}

/* ── TIME ATTACK BAR ── */
.time-attack-bar{
  position:absolute;bottom:0;left:0;right:0;height:5px;
  background:rgba(255,255,255,.05);border-radius:0 0 var(--r-md) var(--r-md);overflow:hidden;
}
.time-attack-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--accent));border-radius:999px;transition:width .1s linear;}

/* ── COMBO ── */
.combo-display{position:absolute;top:var(--sp-sm);left:var(--sp-sm);font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-lg);letter-spacing:1px;color:var(--accent2);opacity:0;transition:opacity .3s;pointer-events:none;}
.combo-display.show{opacity:1;}
.combo-display.mega{color:var(--accent);animation:combo-pulse .5s ease;}
@keyframes combo-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

/* ── ANSWER ── */
.answer-wrap{display:-webkit-flex;display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-sm);-webkit-align-items:stretch;align-items:stretch;}
.answer-input{
  -webkit-appearance:none;appearance:none;
  flex:1;background:var(--panel2);border:2px solid rgba(255,255,255,.1);
  border-radius:var(--r-sm);color:var(--text);
  font-family:'Bangers',Impact,Arial,sans-serif;
  font-size:16px;letter-spacing:2px;text-align:center;
  padding:var(--sp-sm) var(--sp-md);outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-box-shadow:none;box-shadow:none;
}
.answer-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(247,201,72,.15);}
.answer-input.correct{border-color:var(--green);background:rgba(34,197,94,.1);animation:flash-green .4s ease;}
.answer-input.wrong{border-color:var(--red);background:rgba(239,68,68,.1);}
@keyframes flash-green{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.15);}50%{box-shadow:0 0 0 8px rgba(34,197,94,.35);}}

.submit-btn{
  -webkit-appearance:none;appearance:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:var(--r-sm);color:#111;
  font-family:'Bangers',Impact,Arial,sans-serif;
  font-size:var(--fs-xl);letter-spacing:2px;
  padding:0 20px;cursor:pointer;
  box-shadow:0 4px 20px rgba(247,201,72,.3);
  touch-action:manipulation;-webkit-flex-shrink:0;flex-shrink:0;
  transition:transform .15s;
}
.submit-btn:active{transform:scale(.96);}

/* ── NUMPAD ── */
.numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-sm);margin-bottom:var(--sp-md);}
.num-btn{
  -webkit-appearance:none;appearance:none;
  background:var(--panel2);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r-sm);color:var(--text);
  font-family:'Bangers',Impact,Arial,sans-serif;
  font-size:var(--fs-xl);letter-spacing:1px;
  padding:12px;cursor:pointer;transition:background .15s;
  touch-action:manipulation;min-height:48px;
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
}
.num-btn:active{background:var(--panel);transform:scale(.94);}
.num-btn.del{color:var(--red);}
.num-btn.ok{background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(78,205,196,.2));border-color:var(--green);color:var(--green);}

/* ── IDLE / START ── */
.idle-screen{text-align:center;padding:var(--sp-md) 0;}
.idle-icon{font-size:2.8rem;margin-bottom:10px;}
.idle-text{color:var(--muted);font-size:var(--fs-sm);margin-bottom:var(--sp-md);font-weight:900;line-height:1.5;}
.start-btn{
  -webkit-appearance:none;appearance:none;
  background:linear-gradient(135deg,var(--purple),var(--accent3));
  border:none;border-radius:var(--r-md);color:#fff;
  font-family:'Bangers',Impact,Arial,sans-serif;
  font-size:var(--fs-xl);letter-spacing:3px;
  padding:12px 40px;cursor:pointer;
  box-shadow:0 6px 30px rgba(168,85,247,.35);
  transition:transform .15s;touch-action:manipulation;
}
.start-btn:active{transform:scale(.96);}

/* ── PROGRESS PIPS ── */
.progress-row{display:-webkit-flex;display:flex;gap:5px;-webkit-justify-content:center;justify-content:center;margin-top:var(--sp-sm);-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.pip{width:16px;height:16px;border-radius:50%;background:var(--panel2);border:1px solid rgba(255,255,255,.08);transition:all .3s;}
.pip.done{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5);}
.pip.wrong-pip{background:var(--red);border-color:var(--red);}

/* ── HIGHSCORES ── */
.highscores{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-md);padding:var(--sp-md);margin-bottom:var(--sp-md);}
.hs-list{margin-top:var(--sp-sm);}
.hs-row{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:var(--sp-sm);padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  font-size:var(--fs-sm);font-weight:900;
}
.hs-row:last-child{border-bottom:none;}
.hs-rank{font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-lg);color:var(--muted);width:24px;text-align:center;}
.hs-rank.gold{color:#ffd700;}
.hs-rank.silver{color:#c0c0c0;}
.hs-rank.bronze{color:#cd7f32;}
.hs-info{flex:1;min-width:0;}
.hs-name{font-size:var(--fs-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hs-meta{color:var(--muted);font-size:var(--fs-xs);}
.hs-score{font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-lg);color:var(--accent);}
.hs-empty{color:var(--muted);font-size:var(--fs-sm);text-align:center;padding:var(--sp-md) 0;}

/* ── ACHIEVEMENTS ── */
.achievements{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-md);padding:var(--sp-md);margin-bottom:var(--sp-md);}
.achievement-list{display:-webkit-flex;display:flex;gap:var(--sp-sm);-webkit-flex-wrap:wrap;flex-wrap:wrap;margin-top:var(--sp-sm);}
.badge{background:var(--panel2);border:1px solid rgba(255,255,255,.07);border-radius:var(--r-sm);padding:5px 10px;font-size:var(--fs-xs);color:var(--muted);transition:all .3s;font-weight:900;}
.badge.earned{background:linear-gradient(135deg,rgba(247,201,72,.15),rgba(255,107,53,.15));border-color:var(--accent);color:var(--accent);}

/* ── FEEDBACK ── */
.feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:100;font-family:'Bangers',Impact,Arial,sans-serif;font-size:2.8rem;letter-spacing:3px;pointer-events:none;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}
.feedback.show{animation:feedback-pop .6s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes feedback-pop{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}40%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}70%{transform:translate(-50%,-50%) scale(.95);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:0;}}

.xp-popup{position:fixed;pointer-events:none;font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-lg);letter-spacing:2px;color:var(--accent);z-index:99;animation:xp-float 1s ease forwards;}
@keyframes xp-float{0%{transform:translateY(0) scale(.5);opacity:0;}30%{transform:translateY(-20px) scale(1.2);opacity:1;}100%{transform:translateY(-80px) scale(1);opacity:0;}}

/* ── LEVEL UP ── */
.levelup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:var(--sp-md);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);animation:fade-in .3s ease;}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
.levelup-card{background:var(--panel);border:2px solid var(--accent);border-radius:var(--r-lg);padding:32px 36px;text-align:center;box-shadow:0 0 60px rgba(247,201,72,.4);animation:levelup-pop .5s cubic-bezier(.34,1.56,.64,1);max-width:360px;width:100%;}
@keyframes levelup-pop{from{transform:scale(.5) rotate(-5deg);}to{transform:scale(1) rotate(0deg);}}
.levelup-title{font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-sm);letter-spacing:4px;color:var(--muted);margin-bottom:var(--sp-sm);}
.levelup-num{font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-4xl);line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.levelup-sub{color:var(--muted);font-size:var(--fs-sm);margin-top:var(--sp-sm);font-weight:900;}
.levelup-btn{-webkit-appearance:none;appearance:none;margin-top:var(--sp-md);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--r-sm);color:#111;font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-lg);letter-spacing:2px;padding:10px 32px;cursor:pointer;touch-action:manipulation;display:inline-block;}
.levelup-btn:active{transform:scale(.96);}

/* ── NAME INPUT MODAL ── */
.name-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:210;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:var(--sp-md);}
.name-card{background:var(--panel);border:2px solid var(--accent3);border-radius:var(--r-lg);padding:28px 32px;text-align:center;max-width:340px;width:100%;box-shadow:0 0 40px rgba(78,205,196,.3);}
.name-title{font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-xl);letter-spacing:2px;color:var(--accent3);margin-bottom:var(--sp-md);}
.name-input{
  -webkit-appearance:none;appearance:none;
  width:100%;background:var(--panel2);
  border:2px solid rgba(255,255,255,.1);border-radius:var(--r-sm);
  color:var(--text);font-family:'Nunito',Arial,sans-serif;
  font-size:16px;font-weight:900;text-align:center;
  padding:10px;outline:none;margin-bottom:var(--sp-md);
  -webkit-box-shadow:none;box-shadow:none;
}
.name-input:focus{border-color:var(--accent3);}
.name-save-btn{-webkit-appearance:none;appearance:none;background:linear-gradient(135deg,var(--accent3),var(--purple));border:none;border-radius:var(--r-sm);color:#fff;font-family:'Bangers',Impact,Arial,sans-serif;font-size:var(--fs-lg);letter-spacing:2px;padding:10px 28px;cursor:pointer;touch-action:manipulation;}
.name-save-btn:active{transform:scale(.96);}

/* ── STAR BURST ── */
.star-burst{position:fixed;pointer-events:none;z-index:201;font-size:1.8rem;animation:star-fly 1s ease forwards;}
@keyframes star-fly{0%{transform:translate(0,0) scale(0);opacity:1;}100%{transform:var(--tx) scale(1.4);opacity:0;}}

/* ── LANDSCAPE ── */
@media(max-height:500px) and (orientation:landscape){
  .tagline,.achievements,.highscores{display:none;}
  .header{margin-bottom:6px;}.logo{font-size:24px;}
  .game-card{min-height:100px;padding:8px;}

}
@media(min-width:900px){.container{max-width:820px;}}

<body>
<div class="particles" id="particles"></div>

<div class="container">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">⚔️ TAFELKONING ⚔️</div>
    <div class="tagline">LEER DE TAFELS · WORD EEN LEGENDE</div>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" type="button" id="tab-normal">📚 NORMAAL</button>
    <button class="mode-tab" type="button" id="tab-mix">🔀 GEMENGD</button>
    <button class="mode-tab" type="button" id="tab-time">⏱ TIJDAANVAL</button>
  </div>

  <!-- DIFFICULTY -->
  <div class="difficulty-row">
    <span class="diff-label">⚙️ NIVEAU:</span>
    <div class="diff-btns">
      <button class="diff-btn active" type="button" id="diff-easy">😊 MAKKELIJK<br><span style="font-size:10px;opacity:.7">15 sec</span></button>
      <button class="diff-btn" type="button" id="diff-normal">😤 NORMAAL<br><span style="font-size:10px;opacity:.7">10 sec</span></button>
      <button class="diff-btn" type="button" id="diff-hard">💀 MOEILIJK<br><span style="font-size:10px;opacity:.7">6 sec</span></button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-chip"><span class="icon">⚡</span><div><span class="label">STREAK</span><span class="value" id="streak-val">0</span></div></div>
    <div class="stat-chip"><span class="icon">🏆</span><div><span class="label">SCORE</span><span class="value" id="score-val">0</span></div></div>
    <div class="stat-chip"><span class="icon">❤️</span><div><span class="label">LEVENS</span><span class="value" id="lives-val">3</span></div></div>
    <div class="stat-chip"><span class="icon">🎯</span><div><span class="label">NAUWKEURIG</span><span class="value" id="acc-val">-</span></div></div>
  </div>

  <!-- XP BAR -->
  <div class="xp-section">
    <div class="xp-header">
      <span class="level-label" id="level-label">LEVEL 1</span>
      <span class="xp-text" id="xp-text">0 / 100 XP</span>
    </div>
    <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-fill" style="width:0%"></div></div>
  </div>

  <!-- TABLE SELECTOR -->
  <div id="table-selector-wrap">
    <div class="section-title" id="table-section-title">📚 Kies je tafel</div>
    <div class="table-grid" id="table-grid"></div>
  </div>

  <!-- GAME CARD -->
  <div class="game-card" id="game-card">
    <div class="combo-display" id="combo-display"></div>
    <div class="timer-ring-wrap">
      <svg class="timer-ring" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="16" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3.5"/>
        <circle id="timer-circle" cx="22" cy="22" r="16" fill="none" stroke="#4ecdc4" stroke-width="3.5" stroke-dasharray="100" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timer-text">10</div>
    </div>
    <div class="time-attack-bar" id="time-attack-bar" style="display:none">
      <div class="time-attack-fill" id="time-attack-fill" style="width:100%"></div>
    </div>

    <div class="idle-screen" id="idle-screen">
      <div class="idle-icon">🧮</div>
      <div class="idle-text" id="idle-text">Selecteer een tafel<br>en druk op START!</div>
      <button class="start-btn" id="start-btn" type="button">START!</button>
    </div>

    <div id="game-screen" style="display:none;width:100%">
      <div class="question-display" id="question-display"></div>
      <div class="progress-row" id="progress-row"></div>
    </div>
  </div>

  <!-- ANSWER -->
  <div class="answer-wrap" id="answer-section" style="display:none">
    <input type="number" class="answer-input" id="answer-input"
      placeholder="?" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
    <button class="submit-btn" id="submit-btn" type="button">OK</button>
  </div>

  <!-- NUMPAD -->
  <div class="numpad" id="numpad" style="display:none">
    <button class="num-btn" type="button" data-num="1">1</button>
    <button class="num-btn" type="button" data-num="2">2</button>
    <button class="num-btn" type="button" data-num="3">3</button>
    <button class="num-btn del" type="button" data-num="del">⌫</button>
    <button class="num-btn" type="button" data-num="4">4</button>
    <button class="num-btn" type="button" data-num="5">5</button>
    <button class="num-btn" type="button" data-num="6">6</button>
    <button class="num-btn" type="button" data-num="7">7</button>
    <button class="num-btn" type="button" data-num="8">8</button>
    <button class="num-btn" type="button" data-num="9">9</button>
    <button class="num-btn" type="button" data-num="0">0</button>
    <button class="num-btn ok" type="button" data-num="ok">✓</button>
  </div>

  <!-- HIGHSCORES -->
  <div class="highscores">
    <div class="section-title">🥇 Highscores</div>
    <div class="hs-list" id="hs-list"></div>
  </div>

  <!-- ACHIEVEMENTS -->
  <div class="achievements">
    <div class="section-title">🏅 Prestaties</div>
    <div class="achievement-list" id="achievement-list"></div>
  </div>
</div>

<!-- FEEDBACK -->
<div class="feedback" id="feedback"></div>

<!-- LEVEL UP -->
<div class="levelup-overlay" id="levelup-overlay" style="display:none">
  <div class="levelup-card">
    <div class="levelup-title">LEVEL UP!</div>
    <div class="levelup-num" id="levelup-num">2</div>
    <div class="levelup-sub" id="levelup-sub"></div>
    <button class="levelup-btn" id="levelup-btn" type="button">VERDER! 🚀</button>
  </div>
</div>

<!-- NAME INPUT -->
<div class="name-overlay" id="name-overlay" style="display:none">
  <div class="name-card">
    <div class="name-title">🏆 NIEUWE HIGHSCORE!</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:12px;font-weight:900">Vul je naam in</div>
    <input type="text" class="name-input" id="name-input" placeholder="Jouw naam..." maxlength="12" autocomplete="off">
    <button class="name-save-btn" id="name-save-btn" type="button">OPSLAAN ✓</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   TAFELKONING — volledig herschreven met:
   - Normaal / Gemengd / Tijdaanval modus
   - Moeilijkheidsgraad (Makkelijk/Normaal/Moeilijk)
   - Highscores met naam invoer
   - Achievements
   - XP + levels
   - Volledige iOS Safari compatibiliteit
═══════════════════════════════════════════════════════════ */

var QUESTIONS_PER_ROUND = 10;
var TIME_ATTACK_SECS    = 60;
var XP_PER_LEVEL = [0,100,250,450,700,1000,1400,1900,2500,3200,4000];
var DIFF_TIMES   = {easy:15, normal:10, hard:6};
var MAX_SCORES   = 8;

var cfg = { mode:'normal', diff:'easy' };

var state = {
  selectedTable:0, level:1, xp:0, score:0,
  streak:0, bestStreak:0, combo:1, lives:3,
  totalCorrect:0, totalAnswered:0,
  mastered:[], achievements:{},
  roundActive:false, currentQ:null,
  questionIndex:0,
  timerInterval:null, timerLeft:0, blocked:false,
  timeAttackLeft:TIME_ATTACK_SECS, timeAttackInterval:null,
  roundScore:0
};

var ACHIEVEMENTS = [
  {id:'first',    label:'🎉 Eerste Stap',  desc:'Eerste vraag correct'},
  {id:'streak5',  label:'🔥 Op Dreef',      desc:'5 op rij goed'},
  {id:'streak10', label:'💥 Onstoppbaar',   desc:'10 op rij goed'},
  {id:'combo3',   label:'⚡ Combo x3',      desc:'Bereik combo x3'},
  {id:'speed',    label:'⚡ Bliksem Snel',  desc:'Antwoord in <2 sec'},
  {id:'level5',   label:'⭐ Level 5',       desc:'Bereik level 5'},
  {id:'master1',  label:'📖 Tafelkenner',   desc:'Beheers een tafel'},
  {id:'perfect',  label:'💎 Perfect!',      desc:'Ronde zonder fouten'},
  {id:'hundred',  label:'💯 Honderd!',      desc:'100 vragen correct'},
  {id:'mix',      label:'🔀 Mix Master',    desc:'Ronde gemengde modus'},
  {id:'timewin',  label:'⏱ Tijdkoning',    desc:'30+ vragen in tijdaanval'}
];

/* ── INIT ────────────────────────────────────────────────── */
function init() {
  createParticles();
  buildTableGrid();
  buildAchievements();
  loadSave();
  updateUI();
  renderHighscores();
  bindAll();
}

function bindAll() {
  addTC('start-btn',    startGame);
  addTC('submit-btn',   submitAnswer);
  addTC('levelup-btn',  closeLevelUp);
  addTC('name-save-btn',saveName);
  addTC('tab-normal',   function(){ setMode('normal'); });
  addTC('tab-mix',      function(){ setMode('mix'); });
  addTC('tab-time',     function(){ setMode('time'); });
  addTC('diff-easy',    function(){ setDiff('easy'); });
  addTC('diff-normal',  function(){ setDiff('normal'); });
  addTC('diff-hard',    function(){ setDiff('hard'); });

  document.getElementById('answer-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') submitAnswer();
  });
  document.getElementById('name-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') saveName();
  });

  var numpad = document.getElementById('numpad');
  numpad.addEventListener('touchend', function(e){
    var b = e.target.closest('[data-num]');
    if (!b) return; e.preventDefault(); numPress(b.getAttribute('data-num'));
  });
  numpad.addEventListener('click', function(e){
    var b = e.target.closest('[data-num]');
    if (!b) return; numPress(b.getAttribute('data-num'));
  });
}

/* addTC = add TouchClick: touchend + click, avoids 300ms iOS delay */
function addTC(id, fn) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchend', function(e){ e.preventDefault(); fn(); });
  el.addEventListener('click', fn);
}

/* ── MODE / DIFF ─────────────────────────────────────────── */
function setMode(m) {
  if (state.roundActive) return;
  cfg.mode = m;
  var tabs = ['tab-normal','tab-mix','tab-time'];
  var modes = ['normal','mix','time'];
  for (var i = 0; i < tabs.length; i++) {
    var el = document.getElementById(tabs[i]);
    if (el) { el.className = 'mode-tab' + (modes[i] === m ? ' active' : ''); }
  }
  var wrap = document.getElementById('table-selector-wrap');
  var idleText = document.getElementById('idle-text');
  if (m === 'mix') {
    if (wrap) wrap.style.display = 'none';
    if (idleText) idleText.innerHTML = 'Alle tafels door elkaar!<br>Druk op START!';
    state.selectedTable = 0;
  } else if (m === 'time') {
    if (wrap) wrap.style.display = 'none';
    if (idleText) idleText.innerHTML = '60 seconden!<br>Zo veel mogelijk goed!';
    state.selectedTable = 0;
  } else {
    if (wrap) wrap.style.display = 'block';
    if (idleText) idleText.innerHTML = 'Selecteer een tafel<br>en druk op START!';
  }
  document.getElementById('time-attack-bar').style.display = m === 'time' ? 'block' : 'none';
}

function setDiff(d) {
  if (state.roundActive) return;
  cfg.diff = d;
  ['easy','normal','hard'].forEach(function(x){
    var el = document.getElementById('diff-'+x);
    if (el) el.className = 'diff-btn' + (x === d ? ' active' : '');
  });
}

/* ── TABLE SELECT ────────────────────────────────────────── */
function selectTable(t) {
  if (state.roundActive) return;
  state.selectedTable = t;
  document.querySelectorAll('.table-btn').forEach(function(b){ b.classList.remove('selected'); });
  var btn = document.getElementById('table-btn-'+t);
  if (btn) btn.classList.add('selected');
  var idleText = document.getElementById('idle-text');
  if (idleText) idleText.innerHTML = 'Tafel van '+t+' geselecteerd!<br>Druk op START!';
}

/* ── GAME START ──────────────────────────────────────────── */
function startGame() {
  if (cfg.mode === 'normal' && !state.selectedTable) {
    showFeedback('KIES EEN TAFEL!', '#ff6b35'); return;
  }
  state.roundActive = true;
  state.lives = 3; state.combo = 1;
  state.questionIndex = 0; state.blocked = false;
  state.roundScore = 0;

  document.getElementById('idle-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('answer-section').style.display = '-webkit-flex';
  document.getElementById('answer-section').style.display = 'flex';
  document.getElementById('numpad').style.display = 'grid';

  if (cfg.mode === 'time') {
    state.timerLeft = 0; // per-question timer not used
    document.getElementById('timer-circle').style.strokeDashoffset = 100;
    document.getElementById('timer-text').textContent = '';
    startTimeAttack();
    buildProgressPips(0); // infinite, no pips needed — hide row
    document.getElementById('progress-row').style.display = 'none';
  } else {
    document.getElementById('progress-row').style.display = '-webkit-flex';
    document.getElementById('progress-row').style.display = 'flex';
    buildProgressPips(QUESTIONS_PER_ROUND);
    document.getElementById('time-attack-bar').style.display = 'none';
  }

  nextQuestion();
  updateUI();
}

function buildProgressPips(n) {
  var row = document.getElementById('progress-row');
  row.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var pip = document.createElement('div');
    pip.className = 'pip'; pip.id = 'pip-'+i;
    row.appendChild(pip);
  }
}

/* ── TIME ATTACK ─────────────────────────────────────────── */
function startTimeAttack() {
  state.timeAttackLeft = TIME_ATTACK_SECS;
  updateTimeAttackBar();
  clearInterval(state.timeAttackInterval);
  state.timeAttackInterval = setInterval(function(){
    state.timeAttackLeft -= 0.1;
    updateTimeAttackBar();
    if (state.timeAttackLeft <= 0) {
      clearInterval(state.timeAttackInterval);
      endRound();
    }
  }, 100);
}

function updateTimeAttackBar() {
  var pct = Math.max(0, state.timeAttackLeft / TIME_ATTACK_SECS * 100);
  var fill = document.getElementById('time-attack-fill');
  if (fill) fill.style.width = pct + '%';
  // Also show remaining seconds in timer text area
  document.getElementById('timer-text').textContent = Math.ceil(state.timeAttackLeft);
  var circ = document.getElementById('timer-circle');
  circ.style.strokeDashoffset = 100 - pct;
  if (pct > 50) circ.style.stroke = '#4ecdc4';
  else if (pct > 25) circ.style.stroke = '#f7c948';
  else circ.style.stroke = '#ef4444';
}

/* ── QUESTION ────────────────────────────────────────────── */
function makeQuestion() {
  var a, b;
  if (cfg.mode === 'mix' || cfg.mode === 'time') {
    a = Math.floor(Math.random() * 10) + 1;
  } else {
    a = state.selectedTable;
  }
  b = Math.floor(Math.random() * 10) + 1;
  return { a:a, b:b, answer:a*b };
}

function nextQuestion() {
  if (cfg.mode !== 'time') {
    if (state.lives <= 0 || state.questionIndex >= QUESTIONS_PER_ROUND) {
      endRound(); return;
    }
  }
  state.currentQ = makeQuestion();
  state.blocked = false;

  var qEl = document.getElementById('question-display');
  qEl.classList.remove('shake','pop');
  void qEl.offsetWidth;
  qEl.classList.add('pop');
  qEl.textContent = state.currentQ.a + ' × ' + state.currentQ.b + ' = ?';

  var inp = document.getElementById('answer-input');
  inp.value = '';
  inp.classList.remove('correct','wrong');

  if (cfg.mode !== 'time') startQuestionTimer();
}

function startQuestionTimer() {
  clearInterval(state.timerInterval);
  state.timerLeft = DIFF_TIMES[cfg.diff];
  updateQuestionTimer();
  state.timerInterval = setInterval(function(){
    state.timerLeft -= 0.1;
    updateQuestionTimer();
    if (state.timerLeft <= 0) { clearInterval(state.timerInterval); timeOut(); }
  }, 100);
}

function updateQuestionTimer() {
  var frac = Math.max(0, state.timerLeft / DIFF_TIMES[cfg.diff]);
  var circ = document.getElementById('timer-circle');
  var txt  = document.getElementById('timer-text');
  circ.style.strokeDashoffset = 100 - (frac * 100);
  txt.textContent = Math.ceil(state.timerLeft);
  if (frac > 0.5) { circ.style.stroke = '#4ecdc4'; txt.style.color = ''; }
  else if (frac > 0.25) { circ.style.stroke = '#f7c948'; txt.style.color = '#f7c948'; }
  else { circ.style.stroke = '#ef4444'; txt.style.color = '#ef4444'; }
}

function timeOut() {
  if (state.blocked) return;
  state.blocked = true;
  showFeedback('⏰ TE LAAT!', '#ef4444');
  registerWrong();
}

/* ── ANSWER ──────────────────────────────────────────────── */
function submitAnswer() {
  if (!state.roundActive || state.blocked) return;
  var val = parseInt(document.getElementById('answer-input').value, 10);
  if (isNaN(val)) return;
  clearInterval(state.timerInterval);
  state.blocked = true;
  if (val === state.currentQ.answer) registerCorrect();
  else registerWrong();
}

function registerCorrect() {
  var maxTime = DIFF_TIMES[cfg.diff];
  var timeBonus  = Math.round((state.timerLeft / maxTime) * 20);
  var comboBonus = state.combo;
  if (cfg.mode !== 'time' && state.timerLeft >= maxTime - 2) earnAchievement('speed');

  state.combo = Math.min(state.combo + 1, 8);
  state.streak++;
  state.bestStreak = Math.max(state.bestStreak, state.streak);
  state.totalCorrect++;
  state.totalAnswered++;

  var xpEarned = (10 + timeBonus) * comboBonus;
  var pts = (100 + timeBonus * 5) * comboBonus;
  state.score += pts;
  state.roundScore += pts;
  addXP(xpEarned);

  var pip = document.getElementById('pip-'+state.questionIndex);
  if (pip) pip.classList.add('done');
  document.getElementById('answer-input').classList.add('correct');

  showFeedback(getCorrectWord(), 'var(--green)');
  spawnXpPopup('+'+xpEarned+' XP');

  earnAchievement('first');
  if (state.streak >= 5)  earnAchievement('streak5');
  if (state.streak >= 10) earnAchievement('streak10');
  if (state.combo >= 3)   earnAchievement('combo3');
  if (state.totalCorrect >= 100) earnAchievement('hundred');
  if (cfg.mode === 'mix') earnAchievement('mix');

  state.questionIndex++;
  updateUI();
  setTimeout(function(){ if (state.roundActive) nextQuestion(); }, 600);
}

function registerWrong() {
  state.combo = 1; state.streak = 0;
  if (cfg.mode !== 'time') state.lives--;
  state.totalAnswered++;

  var pip = document.getElementById('pip-'+state.questionIndex);
  if (pip) pip.classList.add('wrong-pip');

  var inp = document.getElementById('answer-input');
  inp.value = state.currentQ.answer;
  inp.classList.add('wrong');
  document.getElementById('question-display').classList.add('shake');
  showFeedback('✗ '+state.currentQ.answer+'!', 'var(--red)');

  state.questionIndex++;
  updateUI();
  setTimeout(function(){
    if (state.roundActive) nextQuestion();
  }, 1000);
}

function getCorrectWord() {
  var w = ['JUIST! 🎯','TOP! ⭐','GOED! 🔥','SUPER! 💥','NICE! ✨','PRIMA! 🚀','BRAVO! 🏆'];
  return w[Math.floor(Math.random() * w.length)];
}

/* ── END ROUND ───────────────────────────────────────────── */
function endRound() {
  clearInterval(state.timerInterval);
  clearInterval(state.timeAttackInterval);
  state.roundActive = false;

  var correct = state.questionIndex - (cfg.mode === 'time' ? 0 : (3 - state.lives));
  if (cfg.mode !== 'time') correct = state.questionIndex - (3 - state.lives);
  else correct = state.totalCorrect; // rough

  // Mastery (normaal modus, >= 8/10 correct)
  if (cfg.mode === 'normal') {
    var roundCorrect = state.questionIndex - (3 - state.lives);
    if (roundCorrect >= 8) {
      if (state.mastered.indexOf(state.selectedTable) === -1) {
        state.mastered.push(state.selectedTable);
      }
      var mb = document.getElementById('table-btn-'+state.selectedTable);
      if (mb) mb.classList.add('mastered');
      earnAchievement('master1');
    }
    if (state.lives === 3) earnAchievement('perfect');
  }

  // Tijdaanval achievement
  if (cfg.mode === 'time' && state.questionIndex >= 30) earnAchievement('timewin');

  // Check highscore
  var scores = loadHighscores();
  var isHigh = scores.length < MAX_SCORES || state.roundScore > scores[scores.length-1].score;

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('answer-section').style.display = 'none';
  document.getElementById('numpad').style.display = 'none';

  if (isHigh && state.roundScore > 0) {
    showNameEntry();
  } else {
    showIdleEnd();
  }

  saveSave();
}

function showIdleEnd() {
  var roundCorrect = cfg.mode === 'time'
    ? state.questionIndex
    : state.questionIndex - (3 - state.lives);
  var emoji = roundCorrect >= 8 ? '🏆' : roundCorrect >= 5 ? '⭐' : '💪';
  var idle = document.getElementById('idle-screen');
  idle.style.display = 'block';
  var modeLabel = cfg.mode === 'time'
    ? state.questionIndex + ' vragen correct!'
    : roundCorrect + '/' + QUESTIONS_PER_ROUND + ' goed';
  idle.innerHTML =
    '<div class="idle-icon">'+emoji+'</div>'+
    '<div class="idle-text">RONDE KLAAR!<br>'+modeLabel+'</div>'+
    '<button class="start-btn" id="start-btn" type="button">OPNIEUW! 🎮</button>';
  addTC('start-btn', startGame);
  updateUI();
  renderHighscores();
}

/* ── HIGHSCORES ──────────────────────────────────────────── */
function loadHighscores() {
  try {
    return JSON.parse(localStorage.getItem('tafelkoning_hs') || '[]');
  } catch(e) { return []; }
}
function saveHighscores(arr) {
  try { localStorage.setItem('tafelkoning_hs', JSON.stringify(arr)); } catch(e) {}
}

function showNameEntry() {
  document.getElementById('name-overlay').style.display = '-webkit-flex';
  document.getElementById('name-overlay').style.display = 'flex';
  var inp = document.getElementById('name-input');
  inp.value = '';
  setTimeout(function(){ try { inp.focus(); } catch(e){} }, 100);
}

function saveName() {
  var name = (document.getElementById('name-input').value || 'Anoniem').trim() || 'Anoniem';
  var scores = loadHighscores();
  var modeLabel = cfg.mode === 'normal' ? '×'+state.selectedTable
    : cfg.mode === 'mix' ? 'Mix' : '⏱ '+TIME_ATTACK_SECS+'s';
  scores.push({ name:name, score:state.roundScore, mode:modeLabel, diff:cfg.diff });
  scores.sort(function(a,b){ return b.score - a.score; });
  if (scores.length > MAX_SCORES) scores = scores.slice(0, MAX_SCORES);
  saveHighscores(scores);
  document.getElementById('name-overlay').style.display = 'none';
  showIdleEnd();
}

function renderHighscores() {
  var list = document.getElementById('hs-list');
  var scores = loadHighscores();
  if (!scores.length) {
    list.innerHTML = '<div class="hs-empty">Nog geen scores — speel een ronde!</div>';
    return;
  }
  var html = '';
  var medals = ['gold','silver','bronze'];
  for (var i = 0; i < scores.length; i++) {
    var s = scores[i];
    var rankClass = i < 3 ? medals[i] : '';
    var rankIcon  = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)+'';
    html += '<div class="hs-row">'+
      '<div class="hs-rank '+rankClass+'">'+rankIcon+'</div>'+
      '<div class="hs-info">'+
        '<div class="hs-name">'+escHtml(s.name)+'</div>'+
        '<div class="hs-meta">'+escHtml(s.mode)+' · '+escHtml(s.diff)+'</div>'+
      '</div>'+
      '<div class="hs-score">'+s.score.toLocaleString('nl-NL')+'</div>'+
    '</div>';
  }
  list.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── XP / LEVEL ──────────────────────────────────────────── */
function addXP(amount) {
  state.xp += amount;
  var needed = xpNext();
  if (needed && state.xp >= needed) {
    state.xp -= needed; state.level++;
    if (state.level >= 5) earnAchievement('level5');
    showLevelUp();
  }
  updateUI();
}
function xpNext() {
  return state.level < XP_PER_LEVEL.length ? XP_PER_LEVEL[state.level] : null;
}
function showLevelUp() {
  document.getElementById('levelup-num').textContent = state.level;
  var subs = ['','Goed bezig!','Je wordt steeds beter!','Waanzinnig!','Niet te stoppen!','TAFELKONING!','Legendarisch!','Ongelooflijk!','Je bent een genie! 🧠','MEESTERLIJK!','🏆 GRANDMASTER! 🏆'];
  document.getElementById('levelup-sub').textContent = subs[Math.min(state.level, subs.length-1)];
  document.getElementById('levelup-overlay').style.display = '-webkit-flex';
  document.getElementById('levelup-overlay').style.display = 'flex';
  burstStars();
  saveSave();
}
function closeLevelUp() {
  document.getElementById('levelup-overlay').style.display = 'none';
}
function burstStars() {
  var cx = window.innerWidth/2, cy = window.innerHeight/2;
  var emojis = ['⭐','✨','🌟','💫','🎉'];
  for (var i = 0; i < 12; i++) {
    (function(idx){
      var el = document.createElement('div');
      el.className = 'star-burst';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      var angle = (idx/12)*Math.PI*2;
      var dist  = 120+Math.random()*90;
      el.style.cssText = 'left:'+cx+'px;top:'+cy+'px;--tx:translate('+(Math.cos(angle)*dist)+'px,'+(Math.sin(angle)*dist)+'px);';
      document.body.appendChild(el);
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1100);
    })(i);
  }
}

/* ── ACHIEVEMENTS ────────────────────────────────────────── */
function earnAchievement(id) {
  if (state.achievements[id]) return;
  state.achievements[id] = Date.now();
  var el = document.getElementById('badge-'+id);
  if (el) el.classList.add('earned');
  var a = null;
  for (var i = 0; i < ACHIEVEMENTS.length; i++) {
    if (ACHIEVEMENTS[i].id === id) { a = ACHIEVEMENTS[i]; break; }
  }
  if (a) spawnXpPopup(a.label);
  saveSave();
}

/* ── UI UPDATE ───────────────────────────────────────────── */
function updateUI() {
  document.getElementById('streak-val').textContent = state.streak;
  document.getElementById('score-val').textContent  = state.score.toLocaleString('nl-NL');
  var hearts = '';
  for (var h = 0; h < Math.max(0, state.lives); h++) hearts += '❤️';
  document.getElementById('lives-val').textContent = hearts || '💀';
  document.getElementById('acc-val').textContent   = state.totalAnswered > 0
    ? Math.round(state.totalCorrect/state.totalAnswered*100)+'%' : '-';
  document.getElementById('level-label').textContent = 'LEVEL '+state.level;

  var needed = xpNext();
  if (needed) {
    document.getElementById('xp-fill').style.width = Math.min(100, state.xp/needed*100)+'%';
    document.getElementById('xp-text').textContent = state.xp+' / '+needed+' XP';
  } else {
    document.getElementById('xp-fill').style.width = '100%';
    document.getElementById('xp-text').textContent = 'MAX LEVEL 👑';
  }

  var combo = document.getElementById('combo-display');
  if (state.combo > 1) {
    combo.classList.add('show');
    combo.textContent = '🔥 COMBO ×'+state.combo;
    if (state.combo >= 4) combo.classList.add('mega');
    else combo.classList.remove('mega');
  } else {
    combo.classList.remove('show','mega');
    combo.textContent = '';
  }
}

/* ── FEEDBACK ────────────────────────────────────────────── */
function showFeedback(text, color) {
  var el = document.getElementById('feedback');
  el.textContent = text; el.style.color = color;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  el.addEventListener('animationend', function(){ el.classList.remove('show'); }, {once:true});
}
function spawnXpPopup(text) {
  var el = document.createElement('div');
  el.className = 'xp-popup'; el.textContent = text;
  el.style.left = (40+Math.random()*Math.max(0,window.innerWidth-200))+'px';
  el.style.top  = (window.innerHeight*0.45)+'px';
  document.body.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1100);
}

/* ── NUMPAD ──────────────────────────────────────────────── */
function numPress(val) {
  var inp = document.getElementById('answer-input');
  if (val === 'del') inp.value = inp.value.slice(0,-1);
  else if (val === 'ok') submitAnswer();
  else { if (inp.value.length >= 3) return; inp.value += val; }
}

/* ── SAVE / LOAD ─────────────────────────────────────────── */
function saveSave() {
  try {
    localStorage.setItem('tafelkoning_save', JSON.stringify({
      level:state.level, xp:state.xp, score:state.score,
      streak:state.streak, bestStreak:state.bestStreak,
      totalCorrect:state.totalCorrect, totalAnswered:state.totalAnswered,
      mastered:state.mastered, achievements:state.achievements
    }));
  } catch(e) {}
}
function loadSave() {
  try {
    var raw = localStorage.getItem('tafelkoning_save');
    if (!raw) return;
    var d = JSON.parse(raw);
    state.level=d.level||1; state.xp=d.xp||0; state.score=d.score||0;
    state.streak=d.streak||0; state.bestStreak=d.bestStreak||0;
    state.totalCorrect=d.totalCorrect||0; state.totalAnswered=d.totalAnswered||0;
    state.mastered=d.mastered||[]; state.achievements=d.achievements||{};
    state.mastered.forEach(function(t){
      var b = document.getElementById('table-btn-'+t);
      if (b) b.classList.add('mastered');
    });
    Object.keys(state.achievements).forEach(function(id){
      var el = document.getElementById('badge-'+id);
      if (el) el.classList.add('earned');
    });
  } catch(e) {}
}

/* ── BUILD DOM ───────────────────────────────────────────── */
function createParticles() {
  var c = document.getElementById('particles');
  var colors = ['#f7c948','#ff6b35','#4ecdc4','#a855f7','#22c55e'];
  for (var i = 0; i < 18; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var s = Math.random()*6+3;
    p.style.cssText = 'width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*12+8)+'s;animation-delay:'+(Math.random()*10)+'s;';
    c.appendChild(p);
  }
}

function buildTableGrid() {
  var grid = document.getElementById('table-grid');
  for (var t = 1; t <= 10; t++) {
    (function(n){
      var btn = document.createElement('button');
      btn.className = 'table-btn'; btn.id = 'table-btn-'+n;
      btn.type = 'button'; btn.textContent = '×'+n;
      btn.addEventListener('touchend', function(e){ e.preventDefault(); selectTable(n); });
      btn.addEventListener('click', function(){ selectTable(n); });
      grid.appendChild(btn);
    })(t);
  }
  // Mix shortcut inside table grid
  var mix = document.createElement('button');
  mix.className = 'mix-btn'; mix.id = 'mix-shortcut-btn';
  mix.type = 'button'; mix.textContent = '🔀 ALLE TAFELS DOOR ELKAAR';
  mix.addEventListener('touchend', function(e){ e.preventDefault(); setMode('mix'); });
  mix.addEventListener('click', function(){ setMode('mix'); });
  grid.appendChild(mix);
}

function buildAchievements() {
  var list = document.getElementById('achievement-list');
  ACHIEVEMENTS.forEach(function(a){
    var el = document.createElement('div');
    el.className = 'badge'; el.id = 'badge-'+a.id;
    el.title = a.desc; el.textContent = a.label;
    list.appendChild(el);
  });
}

/* ── GO! ── */
init();
</script>
</body>
